<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DropBot Tracker | Premium Delivery Tracking</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app-layout">

        <!-- Top Navigation -->
        <header class="top-nav">
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="none" class="logo-icon">
                    <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                    <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                    <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
                <span>DropBot</span>
            </div>
            <div class="order-id">#ORD-9824X</div>
        </header>

        <!-- Content Area (Relative for absolute positioning of views) -->
        <main class="main-content">

            <!-- MAP VIEW -->
            <section id="view-map" class="view active">
                <div id="map-container"></div>

                <!-- Floating Glass Overlay attached to map -->
                <div class="map-status-overlay glassmorphism">
                    <div class="status-header">
                        <div class="status-indicator"></div>
                        <span id="map-status-text" class="status-text">On the Way</span>
                    </div>
                    <div class="eta-large" id="map-eta-large">12<span>MIN</span></div>
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="map-progress-bar"></div>
                    </div>
                </div>
            </section>

            <!-- ROBOT VIEW -->
            <section id="view-robot" class="view">
                <div class="robot-view-container">

                    <!-- Robot Display Area -->
                    <div class="robot-display-card glassmorphism">
                        <div class="robot-face-wrapper" id="robot-avatar-wrapper">
                            <!-- Animated SVG injected here -->
                        </div>

                        <div class="robot-status-group">
                            <h2 id="robot-status-title">Heading to you!</h2>
                            <p id="robot-status-desc">Cruising smoothly with your order.</p>
                        </div>

                        <!-- Quick Actions / Stickers -->
                        <div class="gamification-tray">
                            <button class="icon-btn" id="btn-draw" title="Draw Face">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M12 20h9"></path>
                                    <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                                </svg>
                            </button>
                            <button class="icon-btn" id="btn-change-face" title="Change Face">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 12A9 9 0 1112 3a9 9 0 019 9z" />
                                    <path d="M9 10h.01M15 10h.01M9.5 15a3.5 3.5 0 005 0" />
                                </svg>
                            </button>
                            <button class="icon-btn" id="btn-wave" title="Send a Wave">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <!-- Telemetry Grid -->
                    <div class="telemetry-grid">
                        <div class="telemetry-card glassmorphism">
                            <div class="tel-icon text-accent-blue">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M23 12a11.05 11.05 0 00-22 0zm-5 7a3 3 0 01-6 0v-7" />
                                </svg>
                            </div>
                            <div class="tel-info">
                                <span class="tel-label">ETA</span>
                                <span class="tel-value" id="robot-eta">12 min</span>
                            </div>
                        </div>

                        <div class="telemetry-card glassmorphism">
                            <div class="tel-icon text-accent-green" id="battery-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="2" y="7" width="16" height="10" rx="2" ry="2" />
                                    <line x1="22" y1="11" x2="22" y2="13" />
                                </svg>
                            </div>
                            <div class="tel-info">
                                <span class="tel-label">Battery</span>
                                <span class="tel-value" id="robot-battery">98%</span>
                            </div>
                        </div>

                        <div class="telemetry-card glassmorphism">
                            <div class="tel-icon text-accent-orange">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6" />
                                </svg>
                            </div>
                            <div class="tel-info">
                                <span class="tel-label">Food Temp</span>
                                <span class="tel-value" id="robot-temp">85°C</span>
                            </div>
                        </div>
                    </div>

                </div>
            </section>

        </main>

        <!-- Bottom Tab Navigation -->
        <nav class="bottom-tabs glassmorphism">
            <button class="tab-item active" data-target="view-map">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="tab-icon">
                    <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"></polygon>
                    <line x1="9" y1="3" x2="9" y2="21"></line>
                    <line x1="15" y1="3" x2="15" y2="21"></line>
                </svg>
                <span>Map</span>
            </button>
            <div class="main-action-wrapper">
                <button class="main-action-btn" id="btn-pickup-action" disabled>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"></path>
                        <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"></path>
                    </svg>
                </button>
            </div>
            <button class="tab-item" data-target="view-robot">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="tab-icon">
                    <rect x="3" y="11" width="18" height="10" rx="2"></rect>
                    <circle cx="12" cy="5" r="2"></circle>
                    <path d="M12 7v4"></path>
                    <line x1="8" y1="16" x2="8" y2="16"></line>
                    <line x1="16" y1="16" x2="16" y2="16"></line>
                </svg>
                <span>Robot</span>
            </button>
        </nav>

        <!-- Toasts -->
        <div id="toast-container"></div>

        <!-- Action Modal -->
        <div id="action-modal" class="modal">
            <div class="modal-backdrop"></div>
            <div class="modal-card">
                <div class="modal-icon text-accent-blue">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0110 0v4"></path>
                    </svg>
                </div>
                <h3 id="modal-title">Unlock Delivery</h3>
                <p id="modal-desc">Your order is here. Please enter the PIN sent to your phone to open the compartment.
                </p>

                <div class="pin-input-group">
                    <input type="text" maxlength="1" class="pin-box">
                    <input type="text" maxlength="1" class="pin-box">
                    <input type="text" maxlength="1" class="pin-box">
                    <input type="text" maxlength="1" class="pin-box">
                </div>

                <button class="btn-primary" id="btn-modal-confirm">Open Hatch</button>
                <button class="btn-text" id="btn-modal-cancel">Maybe Later</button>
            </div>
        </div>

        <!-- Drawing Modal -->
        <div id="draw-modal" class="modal">
            <div class="modal-backdrop" id="draw-modal-backdrop"></div>
            <div class="modal-card">
                <h3 id="draw-modal-title" style="margin-bottom: 8px;">Draw a Custom Face</h3>
                <p style="color: var(--text-secondary); margin-bottom: 20px;">Draw a new face for your DropBot.</p>

                <div
                    style="background:var(--bg-base); border-radius: 24px; margin-bottom: 16px; border: 2px solid var(--glass-border); overflow: hidden; display: flex; justify-content: center;">
                    <canvas id="large-draw-canvas" width="260" height="200"
                        style="touch-action: none; cursor: crosshair; display: block;"></canvas>
                </div>

                <div class="color-picker" style="display:flex; justify-content:center; gap:12px; margin-bottom: 24px;">
                    <button class="color-swatch active" data-color="#8b5cf6" style="background:#8b5cf6;"></button>
                    <button class="color-swatch" data-color="#3b82f6" style="background:#3b82f6;"></button>
                    <button class="color-swatch" data-color="#10b981" style="background:#10b981;"></button>
                    <button class="color-swatch" data-color="#f59e0b" style="background:#f59e0b;"></button>
                    <button class="color-swatch" data-color="#ef4444" style="background:#ef4444;"></button>
                    <button class="color-swatch" data-color="#fafafa" style="background:#fafafa;"></button>
                </div>

                <div style="display:flex; gap: 12px; width: 100%;">
                    <button class="btn-text" id="btn-draw-clear" style="flex:1;">Clear</button>
                    <button class="btn-primary" id="btn-draw-apply" style="margin-bottom: 0; flex:2;">Apply
                        Face</button>
                </div>
            </div>
        </div>
    </div>

    <script src="telemetry.js"></script>
    <script src="ui.js"></script>
    <script src="app.js"></script>
</body>

</html>
